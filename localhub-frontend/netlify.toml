[build]
  command = "npm run build"
  publish = "dist"
  
  [build.environment]
  NODE_VERSION = "22"

# kakaomap.html은 SPA 라우팅 대상이 아닌 실제 정적 파일이므로 리다이렉트보다 먼저 매칭되어야 한다.
[[redirects]]
  from = "/kakaomap.html"
  to = "/kakaomap.html"
  status = 200

# Vue Router 등 클라이언트 사이드 라우팅을 쓰지 않더라도,
# 새로고침 시 404가 나지 않도록 나머지 경로는 index.html로 폴백한다.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
